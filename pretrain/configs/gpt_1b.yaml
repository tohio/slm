name: slm-1b
wandb_project: slm
model:
  vocab_size: 32000
  hidden_size: 2048
  num_hidden_layers: 32
  num_attention_heads: 32
  num_key_value_heads: 8
  max_position_embeddings: 4096
  rope_theta: 500000.0      # extended base for longer context
  rms_norm_eps: 1.0e-5
  initializer_range: 0.02
  tie_word_embeddings: true
data:
  val_fraction: 0.005
training:
  # ── Batch size ──────────────────────────────────────────────────────────────
  # Global batch = micro_batch_size × gradient_accumulation_steps × num_gpus
  # These values assume 1 GPU. Adjust before running multi-GPU training:
  #   divide gradient_accumulation_steps by num_gpus to hold global batch constant
  #   divide max_steps by num_gpus to hold token budget constant
  #
  # 1 GPU:  2 × 64 × 1 = 128 seqs × 4096 tokens = ~524k tokens/step → 1.5M steps = ~786B tokens
  # 4 GPU:  2 × 16 × 4 = 128 seqs × 4096 tokens = ~524k tokens/step → 375k steps  (grad_accum=16, max_steps=375000)
  # 8 GPU:  2 × 8  × 8 = 128 seqs × 4096 tokens = ~524k tokens/step → 187.5k steps (grad_accum=8,  max_steps=187500)
  max_steps: 1500000
  warmup_steps: 2000
  micro_batch_size: 2
  gradient_accumulation_steps: 64  # 1 GPU default — see scaling note above
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: true     # required at 1B to fit activations in memory
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb
optimizer:
  lr: 1.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
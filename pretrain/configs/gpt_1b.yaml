name: slm-1b
wandb_project: slm

model:
  vocab_size: 32000
  hidden_size: 2048
  num_hidden_layers: 32
  num_attention_heads: 32
  num_key_value_heads: 8
  max_position_embeddings: 4096
  rope_theta: 500000.0           # pre-stretched base (consistent across all sizes)
  rms_norm_eps: 1.0e-5
  initializer_range: 0.02
  tie_word_embeddings: true

data:
  val_fraction: 0.005

training:
  # ── Batch size ──────────────────────────────────────────────────────────────
  # Global batch = micro_batch_size × gradient_accumulation_steps × num_gpus
  # These values assume 1 GPU. Adjust before running multi-GPU training:
  #   divide gradient_accumulation_steps by num_gpus to hold global batch constant
  #   divide max_steps by num_gpus to hold token budget constant
  #
  # Dataset: 30B tokens
  # Tokens/step (1 GPU): 2 × 64 × 1 × 4096 = ~524k tokens/step
  # 1 epoch  → ~57,000 steps  ← recommended
  #
  # At 30B tokens / 1 epoch every source stays below its supply ceiling, so
  # no repetition is needed. Modern small-model training (Llama, Phi, Qwen)
  # follows the single-epoch pattern at this scale — fresh tokens outperform
  # repeated ones.
  #
  # 1 GPU:  grad_accum=64, max_steps=57000
  # 4 GPU:  grad_accum=16, max_steps=14250
  # 8 GPU:  grad_accum=8,  max_steps=7125
  max_steps: 57000
  warmup_steps: 2000
  micro_batch_size: 2
  gradient_accumulation_steps: 64  # 1 GPU default — see scaling note above
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: true     # required at 1B to fit activations in memory
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb

optimizer:
  lr: 1.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
name: slm-125m
wandb_project: slm
model:
  vocab_size: 32000
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  num_key_value_heads: 4
  max_position_embeddings: 2048
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  initializer_range: 0.02
  tie_word_embeddings: true
data:
  val_fraction: 0.005
training:
  # ── Batch size ──────────────────────────────────────────────────────────────
  # Global batch = micro_batch_size × gradient_accumulation_steps × num_gpus
  # These values assume 1 GPU. Adjust before running multi-GPU training:
  #   divide gradient_accumulation_steps by num_gpus to hold global batch constant
  #   divide max_steps by num_gpus to hold token budget constant
  #
  # 1 GPU:  4 × 8 × 1 = 32 seqs × 2048 tokens = ~65k tokens/step → 150k steps = ~9.8B tokens
  # 4 GPU:  4 × 2 × 4 = 32 seqs × 2048 tokens = ~65k tokens/step → 37.5k steps = ~9.8B tokens  (grad_accum=2, max_steps=37500)
  # 8 GPU:  4 × 1 × 8 = 32 seqs × 2048 tokens = ~65k tokens/step → 18.75k steps = ~9.8B tokens (grad_accum=1, max_steps=18750)
  max_steps: 150000
  #max_steps: 18750
  warmup_steps: 2000
  #warmup_steps: 250
  micro_batch_size: 4
  gradient_accumulation_steps: 8   # 1 GPU default — see scaling note above
  #gradient_accumulation_steps: 1
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: false
  eval_steps: 1000
  #eval_steps: 250
  save_steps: 1000
  #save_steps: 250
  save_total_limit: 3
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb
optimizer:
  lr: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
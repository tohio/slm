name: slm_gpt_125m

trainer:
  devices: 1
  num_nodes: 1
  accelerator: gpu
  precision: bf16
  logger: false
  enable_checkpointing: false
  max_steps: 200000
  log_every_n_steps: 10
  val_check_interval: 1000
  limit_val_batches: 50
  gradient_clip_val: 1.0

exp_manager:
  explicit_log_dir: /results/slm_gpt_125m
  name: ${name}
  create_wandb_logger: false
  wandb_logger_kwargs:
    project: slm
    name: gpt_125m
  resume_if_exists: true
  resume_ignore_no_checkpoint: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: val_loss
    save_top_k: 3
    mode: min
    save_last: true
    filename: slm_gpt_125m--{val_loss:.2f}-{step}-{consumed_samples}
    model_parallel_size: ${multiply:${model.tensor_model_parallel_size}, ${model.pipeline_model_parallel_size}}

model:
  # ── Architecture (125M) ────────────────────────────────────────────────────
  num_layers: 12
  hidden_size: 768
  ffn_hidden_size: 3072           # 4x hidden_size
  num_attention_heads: 12
  seq_length: 2048
  max_position_embeddings: 2048
  position_embedding_type: learned_absolute

  # ── Parallelism — single GPU, no model parallelism needed ─────────────────
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  virtual_pipeline_model_parallel_size: null

  gradient_as_bucket_view: true
  resume_from_checkpoint: null

  # ── Tokenizer ──────────────────────────────────────────────────────────────
  tokenizer:
    library: sentencepiece
    # Path matches output of 'make tokenizer' → /data/tokenizer/slm_tokenizer.model
    model: /data/tokenizer/slm_tokenizer.model

  # ── Initialization ─────────────────────────────────────────────────────────
  init_method_std: 0.02
  use_scaled_init_method: true
  hidden_dropout: 0.1
  attention_dropout: 0.1
  ffn_dropout: 0.0

  # ── Attention ──────────────────────────────────────────────────────────────
  apply_query_key_layer_scaling: true
  attention_softmax_in_fp32: false
  bias_gelu_fusion: true
  masked_softmax_fusion: true
  bias_dropout_add_fusion: true

  # ── Normalization ──────────────────────────────────────────────────────────
  normalization: layernorm
  layernorm_epsilon: 1.0e-5
  activation: gelu
  bias: true
  share_embeddings_and_output_weights: false

  # ── Memory — gradient checkpointing saves VRAM ────────────────────────────
  activations_checkpoint_method: uniform
  activations_checkpoint_num_layers: 1
  activations_checkpoint_granularity: full

  # ── Optimizer ──────────────────────────────────────────────────────────────
  optim:
    name: fused_adam
    lr: 3.0e-4
    weight_decay: 0.1
    betas: [0.9, 0.95]
    sched:
      name: CosineAnnealing
      warmup_steps: 2000
      constant_steps: 0
      min_lr: 3.0e-5            # 10% of peak lr

  # ── Data ───────────────────────────────────────────────────────────────────
  data:
    data_impl: mmap
    splits_string: "99,1,0"
    seq_length: ${model.seq_length}
    skip_warmup: true
    num_workers: 4
    dataloader_type: single
    eod_mask_loss: false
    # Paths match output of 'make tokenizer' → /data/curated/tokenized/
    # Weights: 70% general text, 30% code (Chinchilla-style for general+code model)
    data_prefix:
      - 0.7
      - /data/curated/tokenized/text_document
      - 0.3
      - /data/curated/tokenized/text_document   # replace with code path when available

  micro_batch_size: 4
  global_batch_size: 32
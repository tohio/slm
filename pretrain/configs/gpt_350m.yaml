name: slm-350m
wandb_project: slm
model:
  vocab_size: 32000
  hidden_size: 1024
  num_hidden_layers: 24
  num_attention_heads: 16
  num_key_value_heads: 8
  max_position_embeddings: 2048
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  initializer_range: 0.02
  tie_word_embeddings: true
data:
  val_fraction: 0.005
training:
  # ── Batch size ──────────────────────────────────────────────────────────────
  # Global batch = micro_batch_size × gradient_accumulation_steps × num_gpus
  # These values assume 1 GPU. Adjust before running multi-GPU training:
  #   divide gradient_accumulation_steps by num_gpus to hold global batch constant
  #   divide max_steps by num_gpus to hold token budget constant
  #
  # 1 GPU:  4 × 16 × 1 = 64 seqs × 2048 tokens = ~131k tokens/step → 500k steps = ~65B tokens
  # 4 GPU:  4 × 4  × 4 = 64 seqs × 2048 tokens = ~131k tokens/step → 125k steps = ~65B tokens  (grad_accum=4,  max_steps=125000)
  # 8 GPU:  4 × 2  × 8 = 64 seqs × 2048 tokens = ~131k tokens/step → 62.5k steps = ~65B tokens (grad_accum=2,  max_steps=62500)
  max_steps: 500000
  warmup_steps: 2000
  micro_batch_size: 4
  gradient_accumulation_steps: 16  # 1 GPU default — see scaling note above
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: false
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb
optimizer:
  lr: 2.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
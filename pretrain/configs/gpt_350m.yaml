name: slm-350m
wandb_project: slm

model:
  vocab_size: 32000
  hidden_size: 1024
  num_hidden_layers: 24
  num_attention_heads: 16
  num_key_value_heads: 8
  max_position_embeddings: 2048
  rope_theta: 500000.0           # pre-stretched base (consistent across all sizes)
  rms_norm_eps: 1.0e-5
  initializer_range: 0.02
  tie_word_embeddings: true

data:
  val_fraction: 0.005

training:
  # ── Batch size ──────────────────────────────────────────────────────────────
  # Global batch = micro_batch_size × gradient_accumulation_steps × num_gpus
  # These values assume 1 GPU. Adjust before running multi-GPU training:
  #   divide gradient_accumulation_steps by num_gpus to hold global batch constant
  #   divide max_steps by num_gpus to hold token budget constant
  #
  # Dataset: 15B tokens
  # Tokens/step (1 GPU): 4 × 16 × 1 × 2048 = ~131k tokens/step
  # 1 epoch  → ~115,000 steps
  # 2 epochs → ~230,000 steps  ← recommended
  #
  # 1 GPU:  grad_accum=16, max_steps=230000
  # 4 GPU:  grad_accum=4,  max_steps=57500
  # 8 GPU:  grad_accum=2,  max_steps=28750
  max_steps: 230000
  warmup_steps: 2000
  micro_batch_size: 4
  gradient_accumulation_steps: 16  # 1 GPU default — see scaling note above
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: false
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb

optimizer:
  lr: 2.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
name: slm-mini
wandb_project: slm-mini
model:
  vocab_size: 32000
  hidden_size: 384
  num_hidden_layers: 6
  num_attention_heads: 6
  num_key_value_heads: 2
  max_position_embeddings: 1024
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  initializer_range: 0.02
  tie_word_embeddings: true
data:
  val_fraction: 0.005
training:
  # ── Batch size ──────────────────────────────────────────────────────────────
  # Global batch = micro_batch_size × gradient_accumulation_steps × num_gpus
  # These configs are written for 1 GPU (make pretrain-mini GPUS=1).
  # If running on N GPUs, divide gradient_accumulation_steps by N to keep the
  # same global batch size, and divide max_steps by N to keep the same token budget.
  #
  # 1 GPU:  2 × 4 × 1 = 8 seqs × 1024 tokens = ~8k tokens/step
  max_steps: 500            # ~4M tokens — enough to confirm loss decreases
  warmup_steps: 50
  micro_batch_size: 2
  gradient_accumulation_steps: 4
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: false
  eval_steps: 100
  save_steps: 500
  save_total_limit: 1
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb
optimizer:
  lr: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
name: slm-mini
wandb_project: slm-mini

model:
  vocab_size: 32000
  hidden_size: 384
  num_hidden_layers: 6
  num_attention_heads: 6
  num_key_value_heads: 2
  max_position_embeddings: 1024
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  initializer_range: 0.02
  tie_word_embeddings: true

data:
  val_fraction: 0.005

training:
  # ── Batch size ──────────────────────────────────────────────────────────────
  # Mini run — pipeline validation only, not for training.
  # max_steps is intentional: enough to confirm loss decreases, not to converge.
  # 1 GPU:  2 × 4 × 1 × 1024 = ~8k tokens/step × 500 steps = ~4M tokens
  max_steps: 500
  warmup_steps: 50
  micro_batch_size: 2
  gradient_accumulation_steps: 4
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: false
  eval_steps: 100
  save_steps: 500
  save_total_limit: 1
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb

optimizer:
  lr: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
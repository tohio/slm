<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; fill: #085041; }
      .th  { font-size: 14px; font-weight: 500; fill: #085041; }
      .ts  { font-size: 12px; font-weight: 400; fill: #0F6E56; }
      .gh  { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .gs  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .ph  { font-size: 14px; font-weight: 500; fill: #4A1B0C; }
      .ps  { font-size: 12px; font-weight: 400; fill: #712B13; }
      .uh  { font-size: 14px; font-weight: 500; fill: #26215C; }
      .us  { font-size: 12px; font-weight: 400; fill: #3C3489; }
      .ch  { font-size: 14px; font-weight: 500; fill: #4B1528; }
      .cs  { font-size: 12px; font-weight: 400; fill: #72243E; }
    </style>
  </defs>

  <!-- Stage 1: Data Curation (teal) -->
  <rect x="60" y="30" width="560" height="130" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="58" text-anchor="middle">Stage 1 — data curation</text>
  <text class="ts" x="340" y="76" text-anchor="middle">NeMo Curator · CPU instance · parallel Dask pipeline</text>

  <!-- Curation source boxes -->
  <rect x="80" y="90" width="140" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="150" y="114" text-anchor="middle" dominant-baseline="central">Common Crawl</text>
  <text class="ts" x="150" y="132" text-anchor="middle">WARC files</text>

  <rect x="240" y="90" width="140" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="310" y="114" text-anchor="middle" dominant-baseline="central">Wikipedia EN</text>
  <text class="ts" x="310" y="132" text-anchor="middle">clean text</text>

  <rect x="400" y="90" width="200" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="500" y="114" text-anchor="middle" dominant-baseline="central">CodeSearchNet</text>
  <text class="ts" x="500" y="132" text-anchor="middle">Python functions</text>

  <!-- Arrow Stage 1 → pipeline -->
  <line x1="340" y1="161" x2="340" y2="195" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Curator pipeline steps -->
  <rect x="60" y="196" width="560" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="gs" x="340" y="218" text-anchor="middle" dominant-baseline="central">extract → language filter → heuristic filter → exact dedup → fuzzy dedup → PII → tokenize</text>

  <!-- Arrow pipeline → S3 -->
  <line x1="340" y1="241" x2="340" y2="275" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- S3 -->
  <rect x="210" y="276" width="260" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="gh" x="340" y="298" text-anchor="middle" dominant-baseline="central">S3 — tokenized dataset (.bin / .idx)</text>

  <!-- Arrow S3 → Stage 2 -->
  <line x1="340" y1="321" x2="340" y2="355" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Stage 2: Pre-Training (purple) -->
  <rect x="60" y="356" width="560" height="84" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="uh" x="340" y="384" text-anchor="middle">Stage 2 — pre-training</text>
  <text class="us" x="340" y="402" text-anchor="middle">NeMo + Megatron-Core · GPU instance · BF16</text>
  <text class="us" x="340" y="420" text-anchor="middle">GPT decoder-only · 125M params (scalable to 350M, 1B) · ~2.5B tokens</text>

  <!-- Arrow Stage 2 → Stage 3 -->
  <line x1="340" y1="441" x2="340" y2="475" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Stage 3: SFT (purple) -->
  <rect x="60" y="476" width="560" height="100" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="uh" x="340" y="504" text-anchor="middle">Stage 3 — supervised fine-tuning</text>
  <text class="us" x="340" y="522" text-anchor="middle">NeMo Aligner · answer_only_loss · sequential stages</text>

  <!-- SFT sub-boxes -->
  <rect x="90" y="536" width="220" height="28" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="uh" x="200" y="550" text-anchor="middle" dominant-baseline="central">SFT-1: chat</text>

  <line x1="310" y1="550" x2="330" y2="550" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="330" y="536" width="220" height="28" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="uh" x="440" y="550" text-anchor="middle" dominant-baseline="central">SFT-2: code (lower LR)</text>

  <!-- Arrow Stage 3 → Stage 4 -->
  <line x1="340" y1="577" x2="340" y2="611" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Stage 4: DPO (coral) -->
  <rect x="60" y="612" width="560" height="84" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ph" x="340" y="640" text-anchor="middle">Stage 4 — alignment (DPO)</text>
  <text class="ps" x="340" y="658" text-anchor="middle">NeMo Aligner · policy + frozen reference · no reward model</text>
  <text class="ps" x="340" y="676" text-anchor="middle">UltraFeedback + HH-RLHF · beta=0.1</text>

  <!-- Arrow Stage 4 → Output -->
  <line x1="340" y1="697" x2="340" y2="731" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="160" y="732" width="360" height="56" rx="12" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="gh" x="340" y="757" text-anchor="middle" dominant-baseline="central">Aligned model</text>
  <text class="gs" x="340" y="775" text-anchor="middle">HuggingFace export · lm-eval evaluation</text>
</svg>

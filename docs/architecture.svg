<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 760" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-cross" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Background column bands ── -->
  <rect x="32" y="60" width="196" height="252" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5" opacity="0.6"/>
  <rect x="242" y="60" width="196" height="252" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="0.5" opacity="0.6"/>
  <rect x="452" y="60" width="196" height="252" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="0.5" opacity="0.6"/>

  <!-- ── Column headers ── -->
  <text x="130" y="46" text-anchor="middle" font-size="11" font-weight="500" fill="#16a34a" letter-spacing="0.08em">DATA</text>
  <text x="340" y="46" text-anchor="middle" font-size="11" font-weight="500" fill="#9333ea" letter-spacing="0.08em">TRAINING</text>
  <text x="550" y="46" text-anchor="middle" font-size="11" font-weight="500" fill="#ea580c" letter-spacing="0.08em">OUTPUT</text>

  <!-- ══ DATA COLUMN ══ -->

  <!-- Stage 1 -->
  <rect x="48" y="76" width="164" height="60" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="0.75"/>
  <text x="130" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Stage 1 — curate</text>
  <text x="130" y="119" text-anchor="middle" font-size="11" fill="#166534">Download · filter · deduplicate</text>

  <!-- arrow -->
  <line x1="130" y1="136" x2="130" y2="156" stroke="#86efac" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="48" y="156" width="164" height="60" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="0.75"/>
  <text x="130" y="181" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Stage 2 — validate</text>
  <text x="130" y="199" text-anchor="middle" font-size="11" fill="#166534">Quality filter · perplexity</text>

  <!-- arrow -->
  <line x1="130" y1="216" x2="130" y2="236" stroke="#86efac" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3 -->
  <rect x="48" y="236" width="164" height="60" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="0.75"/>
  <text x="130" y="261" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Stage 3 — tokenizer</text>
  <text x="130" y="279" text-anchor="middle" font-size="11" fill="#166534">Train · test · validate</text>

  <!-- ══ TRAINING COLUMN ══ -->

  <!-- Stage 4 -->
  <rect x="258" y="76" width="164" height="60" rx="10" fill="#f3e8ff" stroke="#c084fc" stroke-width="0.75"/>
  <text x="340" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#7e22ce">Stage 4 — pretrain</text>
  <text x="340" y="119" text-anchor="middle" font-size="11" fill="#6b21a8">Train from scratch</text>

  <!-- arrow -->
  <line x1="340" y1="136" x2="340" y2="156" stroke="#d8b4fe" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5 -->
  <rect x="258" y="156" width="164" height="60" rx="10" fill="#f3e8ff" stroke="#c084fc" stroke-width="0.75"/>
  <text x="340" y="181" text-anchor="middle" font-size="13" font-weight="600" fill="#7e22ce">Stage 5 — SFT</text>
  <text x="340" y="199" text-anchor="middle" font-size="11" fill="#6b21a8">Supervised fine-tuning</text>

  <!-- arrow -->
  <line x1="340" y1="216" x2="340" y2="236" stroke="#d8b4fe" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 6 -->
  <rect x="258" y="236" width="164" height="60" rx="10" fill="#f3e8ff" stroke="#c084fc" stroke-width="0.75"/>
  <text x="340" y="261" text-anchor="middle" font-size="13" font-weight="600" fill="#7e22ce">Stage 6 — align</text>
  <text x="340" y="279" text-anchor="middle" font-size="11" fill="#6b21a8">Preference optimisation</text>

  <!-- ══ OUTPUT COLUMN ══ -->

  <!-- Stage 7 -->
  <rect x="468" y="76" width="164" height="60" rx="10" fill="#ffedd5" stroke="#fb923c" stroke-width="0.75"/>
  <text x="550" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">Stage 7 — eval</text>
  <text x="550" y="119" text-anchor="middle" font-size="11" fill="#9a3412">Benchmark evaluation</text>

  <!-- arrow -->
  <line x1="550" y1="136" x2="550" y2="156" stroke="#fdba74" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 8 -->
  <rect x="468" y="156" width="164" height="60" rx="10" fill="#ffedd5" stroke="#fb923c" stroke-width="0.75"/>
  <text x="550" y="181" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">Stage 8 — export</text>
  <text x="550" y="199" text-anchor="middle" font-size="11" fill="#9a3412">Publish model checkpoint</text>

  <!-- arrow -->
  <line x1="550" y1="216" x2="550" y2="236" stroke="#fdba74" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 9 -->
  <rect x="468" y="236" width="164" height="60" rx="10" fill="#ffedd5" stroke="#fb923c" stroke-width="0.75"/>
  <text x="550" y="261" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">Stage 9 — inference</text>
  <text x="550" y="279" text-anchor="middle" font-size="11" fill="#9a3412">Local generation · chat CLI</text>

  <!-- ══ CROSS-COLUMN ARROWS ══ -->

  <!-- Data → Training (at stage 3 level) -->
  <line x1="212" y1="266" x2="258" y2="266" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-cross)"/>
  <text x="235" y="259" text-anchor="middle" font-size="10" fill="#94a3b8">data</text>

  <!-- Training → Output (at stage 6 level) -->
  <line x1="422" y1="266" x2="468" y2="266" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-cross)"/>
  <text x="445" y="259" text-anchor="middle" font-size="10" fill="#94a3b8">model</text>

  <!-- ══ SERVE BLOCK ══ -->

  <!-- routing line from output column down -->
  <path d="M550 296 L550 356 L340 356 L340 376" fill="none" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrow-cross)"/>

  <rect x="32" y="376" width="616" height="64" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.75"/>
  <text x="340" y="403" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Stage 10 — serve</text>
  <text x="340" y="422" text-anchor="middle" font-size="11" fill="#64748b">Production serving · OpenAI-compatible API · Kubernetes</text>

  <!-- ══ DIVIDER ══ -->
  <line x1="40" y1="464" x2="640" y2="464" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="482" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8" letter-spacing="0.08em">ARCHITECTURE</text>

  <!-- ══ ARCHITECTURE BLOCK ══ -->
  <rect x="32" y="492" width="616" height="56" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.75"/>
  <text x="340" y="517" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">Decoder-only transformer</text>
  <text x="340" y="535" text-anchor="middle" font-size="11" fill="#1e40af">RoPE · RMSNorm · SwiGLU · GQA · tied embeddings · no bias</text>

  <!-- arrows arch → models -->
  <line x1="130" y1="548" x2="130" y2="572" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="548" x2="340" y2="572" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="548" x2="550" y2="572" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══ MODEL SIZES ══ -->
  <rect x="32" y="572" width="192" height="56" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.75"/>
  <text x="128" y="597" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">slm-125m</text>
  <text x="128" y="615" text-anchor="middle" font-size="11" fill="#1e40af">125 million parameters</text>

  <rect x="244" y="572" width="192" height="56" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.75"/>
  <text x="340" y="597" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">slm-350m</text>
  <text x="340" y="615" text-anchor="middle" font-size="11" fill="#1e40af">350 million parameters</text>

  <rect x="456" y="572" width="192" height="56" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.75"/>
  <text x="552" y="597" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">slm-1b</text>
  <text x="552" y="615" text-anchor="middle" font-size="11" fill="#1e40af">1 billion parameters</text>

</svg>

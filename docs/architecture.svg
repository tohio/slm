<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 620" width="780" height="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="780" height="620" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="390" y="44" text-anchor="middle" fill="#111827" font-size="17" font-weight="bold" letter-spacing="3">SLM TRAINING PIPELINE</text>
  <line x1="60" y1="56" x2="720" y2="56" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ── Stage 1: Data Curation ── -->
  <rect x="60" y="76" width="660" height="110" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="76" y="97" fill="#15803d" font-size="12" font-weight="bold" letter-spacing="1">STAGE 1 — DATA CURATION</text>
  <text x="76" y="113" fill="#6b7280" font-size="12">NeMo Curator</text>

  <!-- Source boxes -->
  <rect x="76" y="122" width="130" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="141" y="140" text-anchor="middle" fill="#374151" font-size="12">Common Crawl (WARC)</text>

  <rect x="220" y="122" width="130" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="285" y="140" text-anchor="middle" fill="#374151" font-size="12">Wikipedia (EN)</text>

  <rect x="364" y="122" width="130" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="429" y="140" text-anchor="middle" fill="#374151" font-size="12">CodeSearchNet</text>

  <!-- Arrow to curator -->
  <line x1="510" y1="136" x2="548" y2="136" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="550" y="122" width="100" height="28" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="600" y="137" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="bold">Curator</text>
  <text x="600" y="148" text-anchor="middle" fill="#2563eb" font-size="11">Pipeline → S3</text>

  <!-- Down arrow 1 -->
  <line x1="390" y1="186" x2="390" y2="210" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Stage 2: Pre-Training ── -->
  <rect x="60" y="210" width="660" height="90" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="76" y="231" fill="#1d4ed8" font-size="12" font-weight="bold" letter-spacing="1">STAGE 2 — PRE-TRAINING</text>
  <text x="76" y="247" fill="#6b7280" font-size="12">NeMo + Megatron-Core</text>

  <rect x="76" y="256" width="180" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="166" y="271" text-anchor="middle" fill="#374151" font-size="12">GPT ~125M params, BF16</text>
  <text x="166" y="281" text-anchor="middle" fill="#6b7280" font-size="11">single / multi GPU</text>

  <rect x="276" y="256" width="200" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="376" y="271" text-anchor="middle" fill="#374151" font-size="12">General text corpus</text>
  <text x="376" y="281" text-anchor="middle" fill="#6b7280" font-size="11">~2.5B tokens</text>

  <rect x="496" y="256" width="200" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="596" y="271" text-anchor="middle" fill="#374151" font-size="12">Custom BPE tokenizer</text>
  <text x="596" y="281" text-anchor="middle" fill="#6b7280" font-size="11">domain-specific vocab</text>

  <!-- Down arrow 2 -->
  <line x1="390" y1="300" x2="390" y2="324" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Stage 3: SFT ── -->
  <rect x="60" y="324" width="660" height="90" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="76" y="345" fill="#b45309" font-size="12" font-weight="bold" letter-spacing="1">STAGE 3 — SUPERVISED FINE-TUNING</text>
  <text x="76" y="361" fill="#6b7280" font-size="12">NeMo Aligner — sequential: chat → code</text>

  <rect x="76" y="370" width="280" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="216" y="385" text-anchor="middle" fill="#374151" font-size="12">SFT-1: General chat</text>
  <text x="216" y="395" text-anchor="middle" fill="#6b7280" font-size="11">OpenAssistant / Dolly</text>

  <rect x="380" y="370" width="280" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="520" y="385" text-anchor="middle" fill="#374151" font-size="12">SFT-2: Coding</text>
  <text x="520" y="395" text-anchor="middle" fill="#6b7280" font-size="11">CodeSearchNet / The Stack</text>

  <!-- Down arrow 3 -->
  <line x1="390" y1="414" x2="390" y2="438" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Stage 4: DPO ── -->
  <rect x="60" y="438" width="660" height="90" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="76" y="459" fill="#7e22ce" font-size="12" font-weight="bold" letter-spacing="1">STAGE 4 — ALIGNMENT (DPO)</text>
  <text x="76" y="475" fill="#6b7280" font-size="12">NeMo Aligner — no separate reward model required</text>

  <rect x="76" y="484" width="280" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="216" y="499" text-anchor="middle" fill="#374151" font-size="12">UltraFeedback</text>
  <text x="216" y="509" text-anchor="middle" fill="#6b7280" font-size="11">preference pairs</text>

  <rect x="380" y="484" width="280" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="520" y="499" text-anchor="middle" fill="#374151" font-size="12">HH-RLHF</text>
  <text x="520" y="509" text-anchor="middle" fill="#6b7280" font-size="11">preference pairs</text>

  <!-- Down arrow 4 -->
  <line x1="390" y1="528" x2="390" y2="552" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Output ── -->
  <rect x="200" y="552" width="380" height="44" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="572" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="bold">Aligned Instruction-Following Model</text>
  <text x="390" y="587" text-anchor="middle" fill="#6b7280" font-size="12">HuggingFace checkpoint — general chat + code generation</text>



  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9ca3af"/>
    </marker>
  </defs>

</svg>

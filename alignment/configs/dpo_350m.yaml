name: slm-350m-dpo
wandb_project: slm
model:
  base_model_path: $RESULTS_DIR/slm-350m-chat-code/final
  max_seq_length: 2048
dpo:
  beta: 0.1
  max_prompt_length: 1024            # trl 0.29: prompt truncation (removed in trl 1.0)
data:
  train_path: $DATA_DIR/dpo/train.jsonl
  val_path:   $DATA_DIR/dpo/val.jsonl
training:
  epochs: 1                          # DPO needs only 1 epoch — more causes overoptimization
  warmup_ratio: 0.05
  micro_batch_size: 1
  # Target effective batch size: 64
  # gradient_accumulation_steps = 64 / (micro_batch_size x num_gpus)
  #   1 GPU:  64 / (1 x 1) = 64
  #   4 GPU:  64 / (1 x 4) = 16
  #   8 GPU:  64 / (1 x 8) = 8
  gradient_accumulation_steps: 16   # adjust based on your GPU count
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: false
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb
optimizer:
  lr: 3.0e-7
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.98
name: slm_dpo

trainer:
  devices: 1
  num_nodes: 1
  accelerator: gpu
  precision: bf16
  logger: false
  enable_checkpointing: false
  max_epochs: 1
  log_every_n_steps: 10
  val_check_interval: 200
  limit_val_batches: 50
  gradient_clip_val: 1.0

exp_manager:
  explicit_log_dir: /results/slm_dpo
  name: ${name}
  create_wandb_logger: false
  wandb_logger_kwargs:
    project: slm
    name: dpo
  resume_if_exists: true
  resume_ignore_no_checkpoint: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: val_loss
    save_top_k: 3
    mode: min
    save_last: true
    filename: slm_dpo--{val_loss:.2f}-{step}

model:
  restore_from_path: /results/slm_sft_code/checkpoints/last.nemo

  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1

  dpo:
    # Beta controls KL divergence from reference policy.
    # Lower = more aggressive preference optimization.
    # Start at 0.1, reduce to 0.05 if win rate is low.
    beta: 0.1
    ref_policy_kl_penalty: true
    loss_type: sigmoid
    average_log_probs: false
    label_smoothing: 0.0

  data:
    num_workers: 4
    train_ds:
      file_path: /data/dpo/train.jsonl
      max_seq_length: 2048
      micro_batch_size: 2       # DPO runs policy + reference simultaneously
      global_batch_size: 16
      shuffle: true
      add_eos: true
    validation_ds:
      file_path: /data/dpo/val.jsonl
      max_seq_length: 2048
      micro_batch_size: 2
      global_batch_size: 16
      shuffle: false
      add_eos: true

  # DPO is sensitive to LR — keep low
  optim:
    name: fused_adam
    lr: 5.0e-7
    weight_decay: 0.01
    betas: [0.9, 0.98]
    sched:
      name: CosineAnnealing
      warmup_steps: 50
      constant_steps: 0
      min_lr: 0.0

  activations_checkpoint_method: uniform
  activations_checkpoint_num_layers: 1
  activations_checkpoint_granularity: full

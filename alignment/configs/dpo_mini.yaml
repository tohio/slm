name: slm-mini-dpo
wandb_project: slm-mini
model:
  base_model_path: $RESULTS_DIR/slm-mini-chat-code/final
  max_seq_length: 1024
dpo:
  beta: 0.1
  max_prompt_length: 512             # trl 0.29: prompt truncation (removed in trl 1.0)
data:
  train_path: $DATA_DIR/dpo/train.jsonl
  val_path:   $DATA_DIR/dpo/val.jsonl
training:
  # max_steps governs run length; num_train_epochs defaults to 1 and is
  # effectively ignored. Do not set both.
  max_steps: 50                      # enough to validate the training loop
  warmup_ratio: 0.05                 # ~2-3 warmup steps at this scale
  micro_batch_size: 1
  gradient_accumulation_steps: 2     # not performance-sensitive for validation
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: false
  eval_steps: 25
  save_steps: 50
  save_total_limit: 1
  log_steps: 5
  num_workers: 2
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb
optimizer:
  lr: 5.0e-7
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.98
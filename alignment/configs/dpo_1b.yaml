name: slm-1b-dpo
wandb_project: slm

model:
  base_model_path: results/slm-1b-chat-code/final
  max_seq_length: 4096

dpo:
  beta: 0.1
  max_prompt_length: 1024

data:
  train_path: $DATA_DIR//dpo/train.jsonl
  val_path: $DATA_DIR//dpo/val.jsonl

training:
  epochs: 1
  max_steps: 4000
  warmup_steps: 100
  micro_batch_size: 1
  gradient_accumulation_steps: 16
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: true
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb

optimizer:
  lr: 2.0e-7
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.98
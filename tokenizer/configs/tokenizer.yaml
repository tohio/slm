tokenizer:
  model_prefix: /data/tokenizer/slm_tokenizer
  model_type: bpe
  vocab_size: 32000
  character_coverage: 0.9995

  # Training data — sample of curated text (10M sentences sufficient)
  input: /data/tokenizer/training_sample.txt
  input_sentence_size: 10000000
  shuffle_input_sentence: true

  # Token IDs
  pad_id: 0
  unk_id: 1
  bos_id: 2
  eos_id: 3

  # Special tokens — baked in from the start
  # NOTE: <PAD>, <UNK>, <BOS>, <EOS> here are redundant with pad_id/unk_id/bos_id/eos_id
  # above — they push chat tokens from IDs 4-9 to IDs 8-13.
  # Tracked in .todo for a future cleanup pass.
  user_defined_symbols:
    - "<PAD>"
    - "<UNK>"
    - "<BOS>"
    - "<EOS>"
    - "<|system|>"
    - "<|user|>"
    - "<|assistant|>"
    - "<|endofturn|>"
    - "<|code|>"
    - "<|endofcode|>"

  normalization_rule_name: nmt_nfkc_cf
  remove_extra_whitespaces: true
  add_dummy_prefix: true
  byte_fallback: true           # no UNK tokens — encode unknown chars as bytes

  # num_threads intentionally omitted — train_tokenizer.py detects CPU count
  # at runtime and uses all available CPUs automatically

  max_sentence_length: 4096
  train_extremely_large_corpus: false
name: slm_sft_chat

trainer:
  devices: 1
  num_nodes: 1
  accelerator: gpu
  precision: bf16
  logger: false
  enable_checkpointing: false
  # NeMo-Aligner reads training params from trainer.sft
  sft:
    max_steps: -1
    max_epochs: 3
    val_check_interval: 200
    save_interval: 200
    limit_val_batches: 50
    gradient_clip_val: 1.0
    log_every_n_steps: 10

exp_manager:
  explicit_log_dir: /results/slm_sft_chat
  name: ${name}
  create_wandb_logger: false
  wandb_logger_kwargs:
    project: slm
    name: sft_chat
  resume_if_exists: true
  resume_ignore_no_checkpoint: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: val_loss
    save_top_k: 3
    mode: min
    save_last: true
    filename: slm_sft_chat--{val_loss:.2f}-{step}
    save_nemo_on_train_end: true

model:
  # ── Checkpoint ────────────────────────────────────────────────────────────
  restore_from_path: /results/slm_gpt_125m/mcore_gpt.nemo

  # ── Required by NeMo-Aligner ──────────────────────────────────────────────
  mcore_gpt: true
  megatron_amp_O2: true
  gradient_as_bucket_view: true

  # ── Parallelism ───────────────────────────────────────────────────────────
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  virtual_pipeline_model_parallel_size: null
  sequence_parallel: false

  # ── Architecture — must match pretrain checkpoint ─────────────────────────
  num_layers: 12
  hidden_size: 768
  ffn_hidden_size: 3072
  num_attention_heads: 12
  seq_length: 2048
  max_position_embeddings: 2048
  encoder_seq_length: 2048
  kv_channels: null
  num_query_groups: null

  # ── Regularization ────────────────────────────────────────────────────────
  hidden_dropout: 0.1
  attention_dropout: 0.1
  ffn_dropout: 0.0

  # ── Normalization ─────────────────────────────────────────────────────────
  normalization: layernorm
  layernorm_epsilon: 1.0e-05

  # ── Initialization ────────────────────────────────────────────────────────
  init_method_std: 0.02
  use_scaled_init_method: true

  # ── Attention ─────────────────────────────────────────────────────────────
  apply_query_key_layer_scaling: false
  attention_softmax_in_fp32: false

  # ── Embeddings ────────────────────────────────────────────────────────────
  position_embedding_type: learned_absolute
  share_embeddings_and_output_weights: false
  make_vocab_size_divisible_by: 128

  # ── Fusions ───────────────────────────────────────────────────────────────
  bias: true
  bias_gelu_fusion: true
  masked_softmax_fusion: true
  bias_dropout_add_fusion: false

  # ── Activation ────────────────────────────────────────────────────────────
  activation: gelu

  # ── Precision ─────────────────────────────────────────────────────────────
  native_amp_init_scale: 4294967296
  native_amp_growth_interval: 1000
  fp16_lm_cross_entropy: false

  # ── Memory ────────────────────────────────────────────────────────────────
  activations_checkpoint_method: uniform
  activations_checkpoint_num_layers: 1
  activations_checkpoint_granularity: full

  # ── SFT specific ──────────────────────────────────────────────────────────
  answer_only_loss: true
  sample_weight: constant

  # ── Tokenizer ─────────────────────────────────────────────────────────────
  tokenizer:
    library: sentencepiece
    model: /data/tokenizer/slm_tokenizer.model
    type: null
    vocab_file: null
    merge_file: null

  # ── Data ──────────────────────────────────────────────────────────────────
  data:
    chat: true
    num_workers: 0
    train_ds:
      file_path: /data/sft/chat/train.jsonl
      max_seq_length: 2048
      micro_batch_size: 4
      global_batch_size: 32
      shuffle: true
      add_eos: true
    validation_ds:
      file_path: /data/sft/chat/val.jsonl
      max_seq_length: 2048
      micro_batch_size: 4
      global_batch_size: 32
      shuffle: false
      add_eos: true

  # ── Optimizer ─────────────────────────────────────────────────────────────
  optim:
    name: distributed_fused_adam
    lr: 1.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.98]
    sched:
      name: CosineAnnealing
      warmup_steps: 100
      constant_steps: 0
      min_lr: 1.0e-6
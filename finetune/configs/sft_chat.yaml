name: slm_sft_chat

trainer:
  devices: 1
  num_nodes: 1
  accelerator: gpu
  precision: bf16
  logger: false
  enable_checkpointing: false
  # NeMo-Aligner reads training params from trainer.sft, not top-level trainer
  sft:
    max_steps: -1
    max_epochs: 3
    val_check_interval: 200
    save_interval: 200
    limit_val_batches: 50
    gradient_clip_val: 1.0
    log_every_n_steps: 10

exp_manager:
  explicit_log_dir: /results/slm_sft_chat
  name: ${name}
  create_wandb_logger: false
  wandb_logger_kwargs:
    project: slm
    name: sft_chat
  resume_if_exists: true
  resume_ignore_no_checkpoint: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: val_loss
    save_top_k: 3
    mode: min
    save_last: true
    filename: slm_sft_chat--{val_loss:.2f}-{step}
    save_nemo_on_train_end: true

model:
  # Pre-trained checkpoint to fine-tune from
  # Must be a mcore_gpt.nemo file produced by make convert-pretrain
  restore_from_path: /results/slm_gpt_125m/mcore_gpt.nemo
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  megatron_amp_O2: true
  encoder_seq_length: 2048

  # Only compute loss on assistant responses — not the human prompt tokens.
  answer_only_loss: true
  sample_weight: constant

  # ── Data ──────────────────────────────────────────────────────────────────
  data:
    chat: true
    num_workers: 0                # 0 avoids MPI/multiprocessing issues in NeMo-Aligner
    train_ds:
      file_path: /data/sft/chat/train.jsonl
      max_seq_length: 2048
      micro_batch_size: 4
      global_batch_size: 32
      shuffle: true
      add_eos: true
    validation_ds:
      file_path: /data/sft/chat/val.jsonl
      max_seq_length: 2048
      micro_batch_size: 4
      global_batch_size: 32
      shuffle: false
      add_eos: true

  # ── Optimizer ─────────────────────────────────────────────────────────────
  optim:
    name: distributed_fused_adam   # NeMo-Aligner recommended optimizer
    lr: 1.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.98]
    sched:
      name: CosineAnnealing
      warmup_steps: 100
      constant_steps: 0
      min_lr: 1.0e-6

  # ── Memory ────────────────────────────────────────────────────────────────
  activations_checkpoint_method: uniform
  activations_checkpoint_num_layers: 1
  activations_checkpoint_granularity: full
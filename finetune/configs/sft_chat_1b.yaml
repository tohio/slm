name: slm-1b-chat
wandb_project: slm
model:
  base_model_path: $RESULTS_DIR/slm-1b/final
  max_seq_length: 4096
data:
  train_path: $DATA_DIR/sft/chat/train.jsonl
  val_path:   $DATA_DIR/sft/chat/val.jsonl
  packing: false
training:
  epochs: 2
  warmup_ratio: 0.03
  micro_batch_size: 1
  # Target effective batch size: 128
  # gradient_accumulation_steps = 128 / (micro_batch_size x num_gpus)
  #   1 GPU:  128 / (1 x 1)  = 128
  #   4 GPU:  128 / (1 x 4)  = 32
  #   8 GPU:  128 / (1 x 8)  = 16
  gradient_accumulation_steps: 32   # adjust based on your GPU count
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: true       # required at 1B + 4096 seq len
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb
optimizer:
  lr: 5.0e-6                         # lower for larger model
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.98
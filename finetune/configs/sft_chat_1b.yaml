name: slm-1b-chat
wandb_project: slm

model:
  base_model_path: $RESULTS_DIR/slm-1b/final
  max_seq_length: 4096

data:
  train_path: $DATA_DIR/sft/chat/train.jsonl
  val_path:   $DATA_DIR/sft/chat/val.jsonl
  packing: false

training:
  warmup_ratio_recipe: 0.03
  epochs: 2
  micro_batch_size: 4
  eval_micro_batch_size: 2
  gradient_accumulation_steps: 32
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: false
  torch_compile: false
  group_by_length: true
  eval_steps: 2000
  save_steps: 2000
  save_total_limit: 3
  log_steps: 10
  num_workers: 4
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb

optimizer:
  lr: 5e-06
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.98
name: slm_sft_code

trainer:
  devices: 1
  num_nodes: 1
  accelerator: gpu
  precision: bf16
  logger: false
  enable_checkpointing: false
  # NeMo-Aligner reads training params from trainer.sft, not top-level trainer
  sft:
    max_steps: -1
    max_epochs: 3
    val_check_interval: 200
    save_interval: 200
    limit_val_batches: 50
    gradient_clip_val: 1.0
    log_every_n_steps: 10

exp_manager:
  explicit_log_dir: /results/slm_sft_code
  name: ${name}
  create_wandb_logger: false
  wandb_logger_kwargs:
    project: slm
    name: sft_code
  resume_if_exists: true
  resume_ignore_no_checkpoint: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: val_loss
    save_top_k: 3
    mode: min
    save_last: true
    filename: slm_sft_code--{val_loss:.2f}-{step}
    save_nemo_on_train_end: true

model:
  # Sequential fine-tuning: load from chat SFT checkpoint, not pre-train.
  # This preserves conversational ability while adding code capability.
  # Path is auto-resolved by train_sft.sh from /results/slm_sft_chat/
  restore_from_path: /results/slm_sft_chat/checkpoints/last.nemo
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  megatron_amp_O2: true
  encoder_seq_length: 2048

  answer_only_loss: true
  sample_weight: constant

  # ── Data ──────────────────────────────────────────────────────────────────
  data:
    chat: true
    num_workers: 0
    train_ds:
      file_path: /data/sft/code/train.jsonl
      max_seq_length: 2048
      micro_batch_size: 4
      global_batch_size: 32
      shuffle: true
      add_eos: true
    validation_ds:
      file_path: /data/sft/code/val.jsonl
      max_seq_length: 2048
      micro_batch_size: 4
      global_batch_size: 32
      shuffle: false
      add_eos: true

  # ── Optimizer ─────────────────────────────────────────────────────────────
  # Lower LR than chat SFT (5e-6 vs 1e-5) to reduce catastrophic forgetting
  optim:
    name: distributed_fused_adam
    lr: 5.0e-6
    weight_decay: 0.01
    betas: [0.9, 0.98]
    sched:
      name: CosineAnnealing
      warmup_steps: 50
      constant_steps: 0
      min_lr: 5.0e-7

  # ── Memory ────────────────────────────────────────────────────────────────
  activations_checkpoint_method: uniform
  activations_checkpoint_num_layers: 1
  activations_checkpoint_granularity: full
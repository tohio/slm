name: slm-mini-chat-code
wandb_project: slm-mini
model:
  base_model_path: $RESULTS_DIR/slm-mini-chat/final
  max_seq_length: 1024
data:
  train_path: $DATA_DIR/sft/code/train.jsonl
  val_path:   $DATA_DIR/sft/code/val.jsonl
  packing: false
  max_samples: 500                   # truncate for mini validation
training:
  # max_steps governs run length; num_train_epochs defaults to 1 and is
  # effectively ignored. Do not set both.
  max_steps: 50                      # enough to validate the training loop
  warmup_ratio: 0.03                 # ~1-2 warmup steps at this scale
  micro_batch_size: 2
  gradient_accumulation_steps: 2     # not performance-sensitive for validation
  precision: bf16
  gradient_clip_val: 1.0
  gradient_checkpointing: false
  eval_steps: 25
  save_steps: 50
  save_total_limit: 1
  log_steps: 5
  num_workers: 2
  seed: 42
  lr_scheduler: cosine
  report_to:
    - wandb
optimizer:
  lr: 5.0e-6                         # lower than chat SFT — preserve chat capability
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.98
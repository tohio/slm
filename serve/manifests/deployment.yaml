apiVersion: apps/v1
kind: Deployment
metadata:
  name: slm-125m
  namespace: inference
  labels:
    app: slm
    size: 125m
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slm
      size: 125m
  template:
    metadata:
      labels:
        app: slm
        size: 125m
    spec:
      containers:
        - name: vllm
          # Pin to a specific version — never use :latest in production.
          # Check https://github.com/vllm-project/vllm/releases for latest stable.
          image: vllm/vllm-openai:v0.6.3
          args:
            - --model
            - tohio/slm-125m
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --dtype
            - bfloat16
            - --max-model-len
            - "2048"
            - --gpu-memory-utilization
            - "0.90"
            - --served-model-name
            - slm-125m
            # --trust-remote-code is required because SLMConfig and SLMForCausalLM
            # are custom classes not known to the base transformers library.
            # The model is loaded from our own Hub repo — not arbitrary third-party code.
            - --trust-remote-code
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-credentials
                  key: token
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          # PersistentVolumeClaim — model weights are cached across pod restarts.
          # Without this, the model re-downloads from the Hub on every restart,
          # adding significant cold start time especially for 350m and 1b variants.
          # Create the PVC before applying: kubectl apply -f pvc.yaml
          persistentVolumeClaim:
            claimName: slm-hf-cache
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
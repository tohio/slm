apiVersion: apps/v1
kind: Deployment
metadata:
  name: slm-125m
  namespace: inference
  labels:
    app: slm
    size: 125m
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slm
      size: 125m
  template:
    metadata:
      labels:
        app: slm
        size: 125m
    spec:
      containers:
        - name: vllm
          # Pin to a specific version — never use :latest in production.
          # Check https://github.com/vllm-project/vllm/releases for latest stable.
          #
          # v0.19.0 (Apr 2026): first release line with full transformers-5
          # compatibility, which our SLM codebase depends on (tie_weights
          # kwargs, dict-form _tied_weights_keys, DynamicCache.layers API,
          # cache_position in prepare_inputs_for_generation).
          #
          # Preferred over the v0.19.1 patch release for stability — v0.19.1
          # bundles a transformers 5.5.4 bump that is newer than our pin.
          image: vllm/vllm-openai:v0.19.0
          args:
            - --model
            - tohio/slm-125m
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --dtype
            - bfloat16
            # --max-model-len intentionally omitted — vLLM introspects the
            # max context length from the model's config.json. Hardcoding
            # 2048 here silently truncates the 1B variant's 4096 context;
            # this deployment serves 125m (2048 native) but the template
            # should be identical across variants and rely on the config.
            - --gpu-memory-utilization
            # 0.85 leaves ~15% of HBM as scratch for KV cache growth and
            # CUDA graph memory. 0.90 is aggressive on smaller GPUs —
            # ~2.4GB scratch on a 24GB card is tight once multiple
            # concurrent sequences fill the KV cache.
            - "0.85"
            - --served-model-name
            - slm-125m
            # --trust-remote-code is required because SLMConfig and SLMForCausalLM
            # are custom classes not known to the base transformers library.
            # The model is loaded from our own Hub repo, which bundles the
            # architecture as slm_arch/ alongside the weights — see
            # export/export.py and model/config.py::auto_map.
            - --trust-remote-code
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-credentials
                  key: token
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          # PersistentVolumeClaim — model weights are cached across pod restarts.
          # Without this, the model re-downloads from the Hub on every restart,
          # adding significant cold start time especially for 350m and 1b variants.
          # Create the PVC before applying: kubectl apply -f pvc.yaml
          persistentVolumeClaim:
            claimName: slm-hf-cache
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
# =============================================================================
# NeMo Curator Pipeline Configuration
# =============================================================================
# Dask worker count and memory limit are auto-detected at runtime from
# available CPUs and RAM — no instance-specific tuning required.
# Override in the dask: section below only if needed.
#
# Run order:
#   1. make init-dirs
#   2. make download-models          # downloads lid.176.bin
#   3. make download-data            # downloads WARC files
#   4. make docker-curate            # pass 1: quality_filter + tokenization
#                                    # auto-skipped (models don't exist yet)
#   5. make tokenizer                # train tokenizer on curated output
#   6. make train-quality-classifier # train quality classifier
#   7. make tokenize                 # pass 2: generate .bin/.idx mmap files
# =============================================================================

curation:
  input_data_dir: /data/raw
  output_data_dir: /data/curated

  log_dir: /data/logs/curator

  # ── Dask ───────────────────────────────────────────────────────────────────
  dask:
    threads_per_worker: 1
    # n_workers: 16       # uncomment to cap (default: all CPUs)
    # memory_limit: "3GB" # uncomment to cap (default: auto)

  # ── Language Filter ────────────────────────────────────────────────────────
  language_filter:
    enabled: true
    target_language: en
    min_language_score: 0.65
    model_path: /data/models/lid.176.bin

  # ── Heuristic Filter ───────────────────────────────────────────────────────
  heuristic_filter:
    enabled: true
    min_doc_length: 200
    max_doc_length: 100000
    min_word_count: 50
    max_word_count: 100000
    max_symbol_to_word_ratio: 0.1
    max_bullet_start_ratio: 0.9
    max_ellipsis_ratio: 0.1
    max_non_alpha_words_ratio: 0.8
    min_stop_word_count: 2
    stop_words: ["the", "be", "to", "of", "and", "that", "have", "with"]
    max_duplicated_ngram_char_frac:
      n: 5
      fraction: 0.15
    max_top_ngram_char_frac:
      n: 2
      fraction: 0.20

  # ── Quality Filter ─────────────────────────────────────────────────────────
  # Auto-detected at runtime — only runs if quality_classifier.bin exists.
  # Run 'make train-quality-classifier' after pass 1 to generate the model.
  quality_filter:
    enabled: false
    model_path: /data/models/quality_classifier.bin
    min_quality_score: 0.3
    label: __label__hq

  # ── Deduplication ──────────────────────────────────────────────────────────
  deduplication:
    exact_dedup:
      enabled: true
      hash_method: md5
    fuzzy_dedup:
      enabled: true
      num_hashes: 128
      jaccard_threshold: 0.8
      false_positive_check: true

  # ── PII Redaction ──────────────────────────────────────────────────────────
  pii:
    enabled: true
    entities:
      - EMAIL_ADDRESS
      - PHONE_NUMBER
      - IP_ADDRESS
    replacement_string: "<PII>"

  # ── Tokenization ───────────────────────────────────────────────────────────
  # Auto-detected at runtime by pipeline.py — only runs if
  # /data/tokenizer/slm_tokenizer.model exists on disk.
  # Run 'make tokenizer' first to generate the model.
  tokenization:
    enabled: true
    tokenizer_library: sentencepiece
    tokenizer_model: /data/tokenizer/slm_tokenizer.model
    output_format: mmap

  # ── Data Blend ─────────────────────────────────────────────────────────────
  blend:
    general_text:
      path: /data/curated/general
      weight: 0.7
    code:
      path: /data/curated/code
      weight: 0.3